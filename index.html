<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sukem Authentic</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.25)),
url("background.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

}

.card{

width:min(92vw,390px);

padding:35px 25px;

background:rgba(20,20,20,.45);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border-radius:28px;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 15px 45px rgba(0,0,0,.45);

text-align:center;

animation:fade .8s ease;

transition:.35s;

}

.card:hover{

transform:translateY(-5px);

}

@keyframes fade{

from{
opacity:0;
transform:translateY(35px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.avatar{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

box-shadow:0 10px 25px rgba(0,0,0,.45);

margin-bottom:20px;

transition:.35s;

}

.avatar:hover{

transform:scale(1.05);

}

h1{

color:white;

font-size:32px;

margin-bottom:10px;

font-weight:700;

}

p{

color:#f2f2f2;

font-size:17px;

margin-bottom:28px;

}

a{

display:flex;
justify-content:center;
align-items:center;
gap:10px;

text-decoration:none;

color:white;

padding:16px;

margin:14px 0;

border-radius:15px;

font-size:18px;

font-weight:600;

transition:.35s;

box-shadow:0 10px 25px rgba(0,0,0,.25);

}

a:hover{

transform:translateY(-4px);

box-shadow:0 18px 35px rgba(0,0,0,.35);

}

.facebook{

background:#1877F2;

}

.zalo{

background:#0068ff;

}

@media(max-width:768px){

body{

padding:18px;

}

.card{

width:100%;
max-width:360px;

padding:30px 22px;

}

.avatar{

width:100px;
height:100px;

}

h1{

font-size:28px;

}

p{

font-size:16px;

}

a{

font-size:17px;

padding:15px;

}

}

</style>

</head>

<body>

<div class="card">

<img src="avatar.jpg" class="avatar" alt="Avatar">

<h1>Sukem Authentic</h1>

<p>Chuyên giày Tennis • Pickleball Chính Hãng</p>

<a class="facebook"
href="https://www.facebook.com/nickphuluanuthentic"
target="_blank">

📘 Facebook

</a>

<a class="zalo"
href="https://zalo.me/0353856318"
target="_blank">

💬 Zalo

</a>

</div>

</body>
</html>
