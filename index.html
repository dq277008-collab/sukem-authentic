.card{

@keyframes fade{
    from{

    to{

    }
}

button{

    color:#fff;
    font-size:17px;

    cursor:pointer;

    position:relative;
    overflow:hidden;

    transition:all .3s ease;

    box-shadow:0 8px 20px rgba(13,110,253,.35);
}
button:hover{
    transform:translateY(-3px);

    background:linear-gradient(135deg,#0b5ed7,#2563eb);

    box-shadow:0 15px 35px rgba(13,110,253,.45);
}

button:active{
    transform:translateY(1px) scale(.98);
}

button::before{
    content:"";
    position:absolute;

    top:0;
    left:-120%;

    width:70%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.45),
        transparent
    );

    transition:.6s;
}

button:hover::before{
